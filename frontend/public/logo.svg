<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#ffffff"/>
  
  <!-- Outer circle - Aura Green -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#22c55e" stroke-width="2"/>
  
  <!-- Inner decorative circle -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#78716c" stroke-width="1" opacity="0.5"/>
  
  <!-- Letter A in center -->
  <g transform="translate(100, 100)">
    <!-- Custom "A" design -->
    <text x="-20" y="15" font-family="'Noto Serif', serif" font-size="60" font-weight="700" fill="#22c55e" text-anchor="middle">A</text>
  </g>
  
  <!-- Decorative elements - organic shapes suggesting clothing -->
  <circle cx="60" cy="60" r="8" fill="#ff9966" opacity="0.6"/>
  <circle cx="140" cy="60" r="8" fill="#ff9966" opacity="0.6"/>
  <circle cx="60" cy="140" r="8" fill="#ff9966" opacity="0.6"/>
  <circle cx="140" cy="140" r="8" fill="#ff9966" opacity="0.6"/>
</svg>